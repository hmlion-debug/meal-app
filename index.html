<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>作り置き献立アプリ（更新ラク版）</title>
  <style>
    :root{
      --bg:#0b1220; --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.68);
      --strong:rgba(255,255,255,.98);
      --radius:18px; --shadow:0 14px 36px rgba(0,0,0,.35); --max:1000px;
      --font:ui-sans-serif,system-ui,-apple-system,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:var(--font); color:var(--text); overflow-x:hidden;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(125,211,252,.14), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, rgba(167,139,250,.14), transparent 55%),
        linear-gradient(180deg, #060a12, var(--bg) 60%, #050913);
    }
    header{position:sticky; top:0; z-index:10; backdrop-filter:blur(10px);
      background:linear-gradient(180deg, rgba(6,10,18,.88), rgba(6,10,18,.62));
      border-bottom:1px solid var(--line)}
    .head{max-width:var(--max); margin:0 auto; padding:14px 14px 10px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start}
    h1{margin:0; font-size:20px; color:var(--strong)}
    .sub{margin:4px 0 0; font-size:12px; color:var(--muted)}
    .actions{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap}
    .btn{border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--text); padding:10px 12px; border-radius:12px}
    nav{max-width:var(--max); margin:0 auto; padding:0 14px 12px; display:flex; gap:8px; overflow:auto}
    .tab{border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); padding:8px 10px; border-radius:999px; white-space:nowrap}
    .tab.on{border-color:rgba(125,211,252,.45); background:linear-gradient(90deg, rgba(125,211,252,.14), rgba(167,139,250,.12))}
    main{max-width:var(--max); margin:0 auto; padding:12px 14px 22px}
    .card{border:1px solid var(--line); border-radius:var(--radius); background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.035));
      box-shadow:var(--shadow); padding:12px; margin-bottom:12px}
    .muted{color:var(--muted); font-size:12px}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    @media (max-width:640px){.row{grid-template-columns:1fr}}
    input,select{width:100%; border:1px solid var(--line); background:rgba(0,0,0,.18); color:var(--text); padding:10px; border-radius:10px}
    .note{border-left:3px solid rgba(125,211,252,.55); padding:8px 10px; background:rgba(125,211,252,.06); border-radius:12px; margin:8px 0}
    table{width:100%; border-collapse:collapse}
    th,td{border-bottom:1px solid var(--line); padding:8px 6px; vertical-align:top}
    th{font-size:12px; color:var(--muted)}
    @media (max-width:520px){
      thead{display:none}
      table,tbody,tr,td{display:block; width:100%}
      tr{border:1px solid var(--line); border-radius:14px; margin:8px 0; padding:8px; background:rgba(0,0,0,.12)}
      td{border:none; display:flex; justify-content:space-between; gap:10px}
      td::before{content:attr(data-label); color:var(--muted); font-size:12px}
      td:first-child{font-weight:700}
    }
    .panel{display:none}
    .panel.on{display:block}
    details{border:1px solid var(--line); border-radius:12px; background:rgba(255,255,255,.03); margin:8px 0}
    summary{cursor:pointer; padding:10px; font-weight:700}
    .grid2{display:grid; grid-template-columns:1fr 1.2fr; gap:10px; padding:0 10px 10px}
    @media (max-width:760px){.grid2{grid-template-columns:1fr}}
    .box{border:1px solid var(--line); border-radius:10px; padding:8px; background:rgba(0,0,0,.12)}
    .list{list-style:none; padding:0; margin:0}
    .rowItem{display:flex; justify-content:space-between; gap:10px; border-bottom:1px dashed rgba(255,255,255,.12); padding:4px 0}
    .rowItem:last-child{border-bottom:none}
    .checkRow{display:flex; align-items:flex-start; gap:10px; padding:6px 0; border-bottom:1px dashed rgba(255,255,255,.12)}
    .checkRow:last-child{border-bottom:none}
    .checkRow input[type="checkbox"]{width:18px; height:18px; margin-top:2px}
    .checkMain{display:flex; justify-content:space-between; gap:10px; width:100%}
    .qty{color:var(--muted); white-space:nowrap}
    .checked .name{opacity:.65; text-decoration:line-through}
    .tag{display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; font-size:12px;
         border:1px solid rgba(125,211,252,.35); background:rgba(125,211,252,.10);}
    .tag2{border-color:rgba(167,139,250,.35); background:rgba(167,139,250,.10)}
    .danger{border-color:rgba(248,113,113,.35)!important;background:rgba(248,113,113,.10)!important}
    .pill{display:inline-flex;gap:8px;flex-wrap:wrap;align-items:center}
    .k{color:var(--muted);font-size:12px}
  </style>
</head>
<body>
<header>
  <div class="head">
    <div>
      <h1 id="title">作り置き献立アプリ（更新ラク版）</h1>
      <div class="sub" id="subtitle">更新は plans/plan-latest.json の差し替えだけ</div>
      <div class="sub pill">
        <span class="k">履歴：</span><span class="muted">この端末に自動保存（過去プランも選択できます）</span>
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="saveToHistory">このプランを履歴に保存</button>
      <button class="btn" id="resetChecks">買い物チェックをリセット</button>
      <button class="btn" id="clearHistory">履歴を消す</button>
      <button class="btn" onclick="window.print()">印刷</button>
    </div>
  </div>
  <nav>
    <button class="tab on" data-tab="menu">献立</button>
    <button class="tab" data-tab="shopping">食材</button>
    <button class="tab" data-tab="recipes">レシピ</button>
  </nav>
</header>

<main>
  <section class="card">
    <div class="row">
      <label>
        <div class="muted">表示するプラン（最新＋履歴）</div>
        <select id="planSelect"></select>
      </label>
      <label>
        <div class="muted">検索</div>
        <input type="search" id="q" placeholder="例：白菜、味噌、きんぴら…" />
      </label>
    </div>
    <div class="note" id="kidTips"></div>
    <div class="muted" id="status"></div>
  </section>

  <section class="panel on" id="menu"></section>
  <section class="panel" id="shopping"></section>
  <section class="panel" id="recipes"></section>
</main>

<script>
  // ---------- Tabs ----------
  const tabs = document.querySelectorAll('.tab');
  const panels = {menu:document.getElementById('menu'),shopping:document.getElementById('shopping'),recipes:document.getElementById('recipes')};
  tabs.forEach(t=>t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove('on')); t.classList.add('on');
    Object.values(panels).forEach(p=>p.classList.remove('on'));
    panels[t.dataset.tab].classList.add('on');
  });

  // ---------- Keys ----------
  const HISTORY_KEY = 'mealPlansHistory_v1';
  const CHECK_KEY_PREFIX = 'mealShopChecks_v2|'; // + planId
  const statusEl = document.getElementById('status');

  // ---------- Search ----------
  const q = document.getElementById('q');
  q.oninput = ()=>applySearch();
  function applySearch(){
    const kw = (q.value||'').toLowerCase();
    document.querySelectorAll('[data-search]').forEach(el=>{
      el.style.display = (!kw || (el.dataset.search||'').toLowerCase().includes(kw) || el.innerText.toLowerCase().includes(kw)) ? '' : 'none';
    });
  }

  // ---------- Shopping checks ----------
  function getChecks(planId){
    return JSON.parse(localStorage.getItem(CHECK_KEY_PREFIX+planId) || '{}');
  }
  function setChecks(planId, obj){
    localStorage.setItem(CHECK_KEY_PREFIX+planId, JSON.stringify(obj));
  }
  function rowId(planId, scope, name, qty){
    return (planId + '|' + scope + '|' + name + '|' + qty).replace(/\s+/g,'');
  }
  function renderChecklist(container, planId, scope, items){
    const checks = getChecks(planId);
    container.innerHTML = '';
    items.forEach(([name, qty])=>{
      const id = rowId(planId, scope, name, qty);
      const checked = !!checks[id];
      const row = document.createElement('label');
      row.className = 'checkRow' + (checked ? ' checked' : '');
      row.dataset.search = name + ' ' + qty;
      row.innerHTML = `
        <input type="checkbox" ${checked ? 'checked':''} data-id="${id}">
        <div class="checkMain">
          <div class="name">${name}</div>
          <div class="qty">${qty}</div>
        </div>`;
      container.appendChild(row);
    });

    container.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
      cb.addEventListener('change', e=>{
        const id = e.target.dataset.id;
        const obj = getChecks(planId);
        obj[id] = e.target.checked;
        setChecks(planId, obj);
        e.target.closest('.checkRow').classList.toggle('checked', e.target.checked);
      });
    });
  }

  document.getElementById('resetChecks').onclick = ()=>{
    const sel = document.getElementById('planSelect');
    const planId = sel.dataset.planId;
    if(!planId) return;
    if(!confirm('このプランの買い物チェックをリセットしますか？')) return;
    localStorage.removeItem(CHECK_KEY_PREFIX+planId);
    // 再描画
    loadAndRenderSelected();
  };

  // ---------- History ----------
  function loadHistory(){
    try{
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    }catch{ return []; }
  }
  function saveHistory(list){
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }
  function upsertHistory(plan){
    const list = loadHistory();
    const exists = list.findIndex(p=>p.id===plan.id);
    const item = {id:plan.id, title:plan.title, startDate:plan.startDate, savedAt:new Date().toISOString(), plan};
    if(exists>=0) list[exists]=item; else list.unshift(item);
    saveHistory(list);
  }

  document.getElementById('saveToHistory').onclick = ()=>{
    const sel = document.getElementById('planSelect');
    const planId = sel.dataset.planId;
    const planObj = window.__currentPlan;
    if(!planObj) return;
    upsertHistory(planObj);
    rebuildSelect(planObj); // 最新選択維持
    alert('履歴に保存しました（この端末で過去プランも選べます）。');
  };

  document.getElementById('clearHistory').onclick = ()=>{
    if(!confirm('この端末の履歴をすべて削除しますか？（献立データのローカル履歴）')) return;
    localStorage.removeItem(HISTORY_KEY);
    rebuildSelect(window.__currentPlan || null);
  };

  // ---------- Render helpers ----------
  function formatDate(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
  function addDays(base, n){ const d=new Date(base); d.setDate(d.getDate()+n); return d; }

  function renderMenu(plan){
    const start = new Date(plan.startDate);
    panels.menu.innerHTML = (plan.weeks||[]).map(w=>{
      const rows = (w.days||[]).map(day=>{
        const dd = formatDate(addDays(start, day.offset||0));
        const search = [day.dow, dd, day.main, ...(day.sides||[]), day.soup, day.plus].filter(Boolean).join(' ');
        return `
          <tr data-search="${search.replace(/"/g,'&quot;')}">
            <td data-label="曜日">${day.dow||''}</td>
            <td data-label="日付">${dd}</td>
            <td data-label="主菜">${day.main||''}</td>
            <td data-label="副菜">${(day.sides||[]).join(' / ')}</td>
            <td data-label="汁物">${day.soup||''}</td>
            <td data-label="+1品">${day.plus||''}</td>
          </tr>`;
      }).join('');
      return `
        <div class="card" data-search="${w.name||''}">
          <h2 style="margin:0 0 6px;font-size:18px;">${w.name||''}
            <span class="muted">（仕込み：日曜→${w.prep?.sun||''}／水曜→${w.prep?.wed||''}）</span>
          </h2>
          <table>
            <thead><tr><th>曜日</th><th>日付</th><th>主菜</th><th>副菜</th><th>汁物</th><th>＋1品</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }).join('');
  }

  function renderShopping(plan){
    const w1 = plan.shopping?.week1 || {veg:[],protein:[],pantry:[]};
    const w2 = plan.shopping?.week2 || {veg:[],protein:[],pantry:[]};

    panels.shopping.innerHTML = `
      <div class="card">
        <h2 style="margin:0 0 6px;font-size:18px;">買い出し（週別）</h2>
        <div class="muted">チェックは端末に保存（プランごとに別管理）。</div>

        <details open data-search="1週目">
          <summary><span class="tag">1週目</span></summary>
          <details open><summary>野菜</summary><div class="list" id="w1-veg"></div></details>
          <details><summary>たんぱく源・卵・豆製品</summary><div class="list" id="w1-protein"></div></details>
          <details><summary>乾物・乳製品・粉・調味</summary><div class="list" id="w1-pantry"></div></details>
        </details>

        <details data-search="2週目">
          <summary><span class="tag tag2">2週目</span></summary>
          <details open><summary>野菜</summary><div class="list" id="w2-veg"></div></details>
          <details><summary>たんぱく源・卵・豆製品</summary><div class="list" id="w2-protein"></div></details>
          <details><summary>乾物・乳製品・粉・調味</summary><div class="list" id="w2-pantry"></div></details>
        </details>
      </div>`;

    renderChecklist(document.getElementById('w1-veg'), plan.id, 'w1-veg', w1.veg||[]);
    renderChecklist(document.getElementById('w1-protein'), plan.id, 'w1-protein', w1.protein||[]);
    renderChecklist(document.getElementById('w1-pantry'), plan.id, 'w1-pantry', w1.pantry||[]);
    renderChecklist(document.getElementById('w2-veg'), plan.id, 'w2-veg', w2.veg||[]);
    renderChecklist(document.getElementById('w2-protein'), plan.id, 'w2-protein', w2.protein||[]);
    renderChecklist(document.getElementById('w2-pantry'), plan.id, 'w2-pantry', w2.pantry||[]);
  }

  function renderRecipes(plan){
    const groups = {};
    (plan.recipes||[]).forEach(r=>{
      const key = r.prepDay || 'その他';
      (groups[key] = groups[key] || []).push(r);
    });

    const groupHtml = Object.keys(groups).map((k, idx)=>{
      const items = groups[k].map(r=>{
        const ing = (r.ingredients||[]).map(([n,q])=>`<li class="rowItem"><span>${n}</span><span>${q}</span></li>`).join('');
        const steps = (r.steps||[]).map(s=>`<li>${s}</li>`).join('');
        const search = `${k} ${r.type||''} ${r.name} ${(r.ingredients||[]).map(x=>x[0]).join(' ')}`;
        return `
          <details data-search="${search}">
            <summary>【${r.type||'レシピ'}】${r.name} <span class="muted">（${r.servings||''}）</span></summary>
            <div class="grid2">
              <div class="box"><strong>材料</strong><ul class="list">${ing}</ul></div>
              <div class="box"><strong>手順</strong><ol>${steps}</ol>${r.storage?`<div class="muted">保存目安：${r.storage}</div>`:''}</div>
            </div>
          </details>`;
      }).join('');
      return `
        <details open data-search="${k}">
          <summary><span class="tag ${idx%2?'tag2':''}">${k}</span></summary>
          ${items}
        </details>`;
    }).join('');

    panels.recipes.innerHTML = `
      <div class="card">
        <h2 style="margin:0 0 6px;font-size:18px;">レシピ（仕込み日別）</h2>
        <div class="muted">検索欄で「白菜」「味噌」などで絞り込めます。</div>
        ${groupHtml || '<div class="muted">レシピがありません。</div>'}
      </div>`;
  }

  // ---------- Data load ----------
  async function fetchJSON(url){
    const res = await fetch(url, {cache:'no-store'});
    if(!res.ok) throw new Error(`${url} を読み込めません（${res.status}）`);
    return await res.json();
  }

  function rebuildSelect(currentPlan){
    const sel = document.getElementById('planSelect');
    const history = loadHistory();

    sel.innerHTML = '';
    // latest (remote)
    const optLatest = document.createElement('option');
    optLatest.value = '__LATEST__';
    optLatest.textContent = '最新（plan-latest.json）';
    sel.appendChild(optLatest);

    if(history.length){
      const sep = document.createElement('option');
      sep.disabled = true; sep.textContent = '──────── 履歴（この端末）────────';
      sel.appendChild(sep);

      history.forEach(h=>{
        const opt = document.createElement('option');
        opt.value = 'H:' + h.id;
        opt.textContent = `${h.plan?.title || h.title}（${h.id}）`;
        sel.appendChild(opt);
      });
    }

    // set selection
    if(currentPlan){
      sel.value = 'H:' + currentPlan.id; // if it exists in history
      // if not in history yet, keep latest
      if(!history.some(h=>h.id===currentPlan.id)) sel.value='__LATEST__';
    }else{
      sel.value='__LATEST__';
    }
  }

  async function loadAndRenderSelected(){
    const sel = document.getElementById('planSelect');
    const v = sel.value;

    if(v === '__LATEST__'){
      statusEl.textContent = '読み込み：最新（plans/plan-latest.json）';
      const plan = await fetchJSON('./plans/plan-latest.json');
      window.__currentPlan = plan;
      sel.dataset.planId = plan.id;
      document.getElementById('title').textContent = plan.title || '作り置き献立アプリ';
      document.getElementById('subtitle').textContent = (plan.startDate ? `開始日：${plan.startDate}` : '') + (plan.notes?.servings ? `｜分量：${plan.notes.servings}` : '');
      document.getElementById('kidTips').innerHTML = `<strong>2歳向けメモ</strong><div class="muted">${plan.notes?.kidTips||''}</div>`;
      renderMenu(plan); renderShopping(plan); renderRecipes(plan);
      applySearch();
      return;
    }

    if(v.startsWith('H:')){
      const id = v.slice(2);
      const history = loadHistory();
      const item = history.find(h=>h.id===id);
      if(!item){ alert('履歴が見つかりません'); return; }
      const plan = item.plan;
      window.__currentPlan = plan;
      sel.dataset.planId = plan.id;
      statusEl.textContent = `読み込み：履歴（この端末） ${plan.id}`;
      document.getElementById('title').textContent = plan.title || '作り置き献立アプリ';
      document.getElementById('subtitle').textContent = (plan.startDate ? `開始日：${plan.startDate}` : '') + (plan.notes?.servings ? `｜分量：${plan.notes.servings}` : '');
      document.getElementById('kidTips').innerHTML = `<strong>2歳向けメモ</strong><div class="muted">${plan.notes?.kidTips||''}</div>`;
      renderMenu(plan); renderShopping(plan); renderRecipes(plan);
      applySearch();
      return;
    }
  }

  (async ()=>{
    try{
      rebuildSelect(null);
      const sel = document.getElementById('planSelect');
      sel.onchange = ()=>loadAndRenderSelected();
      await loadAndRenderSelected();
    }catch(e){
      panels.menu.innerHTML = `
        <div class="card">
          <div><strong>読み込みエラー</strong></div>
          <div class="muted">${e.message}</div>
          <div class="muted">必要ファイル：/plans/plan-latest.json</div>
        </div>`;
    }
  })();
</script>
</body>
</html>
