name: Sync latest meal plan

on:
  workflow_dispatch:
  schedule:
    # 18:00 JST every day.
    - cron: '0 9 * * *'
  push:
    branches:
      - main
    paths:
      - 'plans/**/*.json'
      - 'scripts/sync-latest-plan.mjs'
      - '.github/workflows/sync-latest-plan.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync latest plan
        run: node scripts/sync-latest-plan.mjs

      - name: Commit synced plan
        run: |
          if git diff --quiet -- plans/plan-latest.json plans/history; then
            echo "No plan changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plans/plan-latest.json plans/history
          git commit -m "Sync latest meal plan"
          git push
